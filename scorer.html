<!DOCTYPE html>
<html>
<head>
<title>Scorer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Match Setup</h2>

<input id="team" placeholder="Team Name">
<input id="bat1" placeholder="Batsman 1">
<input id="bat2" placeholder="Batsman 2">
<input id="bowler" placeholder="Bowler">

<button onclick="startMatch()">Start Match</button>

<hr>

<h2>Ball Entry</h2>

Ball Type

<select id="ballType">
<option value="normal">Normal</option>
<option value="wide">Wide</option>
<option value="noball">No Ball</option>
<option value="bye">Bye</option>
<option value="legbye">Leg Bye</option>
</select>

Runs

<select id="runs">
<option>0</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>6</option>
</select>

Wicket

<select id="wicket">
<option value="none">None</option>
<option value="bowled">Bowled</option>
<option value="caught">Caught</option>
<option value="runout">Run Out</option>
</select>

<button onclick="submitBall()">Submit Ball</button>

<script type="module" src="scorer.js"></script>

</body>
</html>
