<!DOCTYPE html>
<html>
<head>
<title>Scorer Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Match Setup</h2>

<input id="team" placeholder="Team name">
<input id="batsman1" placeholder="Batsman 1">
<input id="batsman2" placeholder="Batsman 2">
<input id="bowler" placeholder="Bowler">

<button onclick="startMatch()">Start Match</button>

<h2>Scoring</h2>

<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(3)">3</button>
<button onclick="run(4)">FOUR</button>
<button onclick="run(6)">SIX</button>

<button onclick="wicket()">WICKET</button>
<button onclick="noball()">NO BALL</button>

<br><br>

<button onclick="changeBowler()">Change Bowler</button>
<button onclick="newBatsman()">New Batsman</button>

<br><br>

<button onclick="endInnings()">End Innings</button>

<script type="module" src="scorer.js"></script>

</body>
</html>
